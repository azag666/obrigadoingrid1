<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Pago</title>
    
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let rawData = urlParams.get('utm_data') || urlParams.get('adname'); 
            if (rawData) {
                rawData = rawData.replace('/start ', '').replace(/\/start\s+/g, '').replace(/%2Fstart%20/g, '').trim();
                const newUrl = new URL(window.location);
                if (rawData.includes('__')) {
                    const parts = rawData.split('__');
                    newUrl.searchParams.set('utm_campaign', parts[0] || 'organico');
                    newUrl.searchParams.set('utm_content', parts[1] || 'organico');
                    newUrl.searchParams.set('utm_term', parts[2] || 'organico');
                    newUrl.searchParams.set('adname', parts[2] || 'organico');
                } else {
                    newUrl.searchParams.set('adname', rawData);
                }
                newUrl.searchParams.delete('utm_data');
                window.history.replaceState({}, '', newUrl);
            }
        })();
    </script>

    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { background-color: #f4f6f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        
        const params = new URLSearchParams(window.location.search);
        fbq('init', '902473605014744');
        fbq('track', 'PageView');

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('payment-form');
            const formContainer = document.getElementById('form-container');
            const successContainer = document.getElementById('success-container');

            if (localStorage.getItem('conversion_sent_tg') === 'true') {
                formContainer.style.display = 'none';
                successContainer.style.display = 'flex';
                setTimeout(() => { window.location.href = 'https://t.me/+W2YdZx24kGk5MjYx'; }, 1500);
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submit-btn');
                submitBtn.disabled = true;
                submitBtn.innerText = 'Verificando...';

                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const amount = parseFloat(document.getElementById('amount').value);
                const adName = params.get('adname') || 'organico';

                if (amount > 0) {
                    // Pixel
                    fbq('track', 'Purchase', { value: amount, currency: 'ARS', content_name: adName });
                    localStorage.setItem('conversion_sent_tg', 'true');

                    // Utmify Payload Completo
                    try {
                        const dataIso = new Date().toISOString();
                        const payload = {
                            orderId: 'tg_' + Date.now(),
                            platform: 'Bot_Telegram',
                            paymentMethod: 'pix',
                            status: 'paid',
                            createdAt: dataIso,
                            approvedDate: dataIso,
                            customer: { name: name, email: email, phone: '5511999999999', document: '60134062086' },
                            products: [{ id: 'vip_01', name: 'VIP', quantity: 1, priceInCents: Math.round(amount * 100), planId: 'vip_plan', planName: 'VIP' }],
                            trackingParameters: {
                                utm_source: params.get('utm_source') || 'facebook',
                                utm_medium: params.get('utm_medium') || 'paid',
                                utm_campaign: params.get('utm_campaign') || null,
                                utm_content: params.get('utm_content') || null,
                                utm_term: params.get('utm_term') || null
                            },
                            commission: { totalPriceInCents: Math.round(amount * 100), gatewayFeeInCents: 0, userCommissionInCents: Math.round(amount * 100) }
                        };

                        await fetch('/.netlify/functions/utmify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } catch (err) { console.error(err); }
                }

                formContainer.style.display = 'none';
                successContainer.style.display = 'flex';
                setTimeout(() => { window.location.href = 'https://t.me/+W2YdZx24kGk5MjYx'; }, 2000);
            });
        });
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="h-2 bg-[#3390ec] w-full"></div>

        <div id="form-container" class="p-8 fade-in flex flex-col">
            <div class="text-center mb-6">
                <i class="ph-fill ph-lock-key text-4xl text-[#3390ec] mb-2"></i>
                <h1 class="text-2xl font-bold">Paso final</h1>
            </div>
            <form id="payment-form" class="space-y-4">
                <input type="text" id="name" required placeholder="Nombre completo" class="w-full p-3 bg-gray-50 rounded-xl border outline-none focus:border-[#3390ec]">
                <input type="email" id="email" required placeholder="Email" class="w-full p-3 bg-gray-50 rounded-xl border outline-none focus:border-[#3390ec]">
                <input type="number" id="amount" required placeholder="Monto (ARS)" class="w-full p-3 bg-gray-50 rounded-xl border outline-none focus:border-[#3390ec]">
                <button type="submit" id="submit-btn" class="w-full bg-[#3390ec] text-white font-bold py-3 rounded-xl hover:bg-[#2c7ec9]">Verificar y liberar</button>
            </form>
        </div>

        <div id="success-container" class="hidden p-8 flex-col items-center text-center fade-in">
            <i class="ph-bold ph-check-circle text-6xl text-green-500 mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">¡Todo listo!</h2>
            <p class="text-gray-500 mb-6">Redirigiendo a Telegram...</p>
            <a href="https://t.me/+W2YdZx24kGk5MjYx" class="w-full bg-[#3390ec] text-white font-bold py-3 rounded-xl">Ir ao bot agora</a>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verificación de Acceso VIP</title>
    
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let rawData = urlParams.get('utm_data') || urlParams.get('adname'); 
            if (rawData) {
                rawData = rawData.replace('/start ', '').replace(/\/start\s+/g, '').replace(/%2Fstart%20/g, '').trim();
                const newUrl = new URL(window.location);
                if (rawData.includes('__')) {
                    const parts = rawData.split('__');
                    // Define as UTMs na URL para a Utmify ler no carregamento do script
                    newUrl.searchParams.set('utm_campaign', parts[0] || 'organico');
                    newUrl.searchParams.set('utm_content', parts[1] || 'organico');
                    newUrl.searchParams.set('utm_term', parts[2] || 'organico');
                    newUrl.searchParams.set('adname', parts[2] || 'organico');
                } else {
                    newUrl.searchParams.set('adname', rawData);
                }
                newUrl.searchParams.delete('utm_data');
                window.history.replaceState({}, '', newUrl);
            }
        })();
    </script>

    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body { background-color: #f4f6f8; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        .tg-card { background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .tg-blue { background-color: #3390ec; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes progress { from { width: 0%; } to { width: 100%; } }
    </style>

    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        
        const currentParams = new URLSearchParams(window.location.search);
        fbq('init', '902473605014744');
        fbq('track', 'PageView');

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('payment-form');
            const formBox = document.getElementById('form-box');
            const successBox = document.getElementById('success-box');

            if (localStorage.getItem('conversion_sent_tg') === 'true') {
                formBox.style.display = 'none';
                successBox.style.display = 'flex';
                setTimeout(() => { window.location.href = 'https://t.me/+W2YdZx24kGk5MjYx'; }, 1000);
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                btn.innerHTML = '<i class="ph ph-spinner animate-spin"></i> Verificando...';

                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const amountPesos = parseFloat(document.getElementById('amount').value);
                
                // --- CONVERSÃO AUTOMÁTICA (TAXA EXATA 0.0038) ---
                const exchangeRate = 0.0038; 
                const amountReal = amountPesos * exchangeRate;
                const adName = currentParams.get('adname') || 'organico';
                const campaign = currentParams.get('utm_campaign') || '34';

                if (amountPesos > 0) {
                    // 1. DISPARA PIXEL META (Enviando em Real)
                    fbq('track', 'Purchase', { 
                        value: amountReal.toFixed(2), 
                        currency: 'BRL', 
                        content_name: adName 
                    });
                    localStorage.setItem('conversion_sent_tg', 'true');

                    // 2. ENVIA PARA UTMIFY VIA FUNÇÃO NETLIFY
                    try {
                        const isoDate = new Date().toISOString();
                        const payload = {
                            orderId: 'tg_' + Date.now(),
                            platform: 'Bot_Telegram',
                            paymentMethod: 'pix',
                            status: 'paid',
                            createdAt: isoDate,
                            approvedDate: isoDate,
                            customer: { 
                                name: name, 
                                email: email, 
                                phone: '5511999999999', 
                                document: '60134062086' 
                            },
                            products: [{ 
                                id: 'vip_01', 
                                name: 'Acceso Vitalicio VIP', 
                                quantity: 1, 
                                priceInCents: Math.round(amountReal * 100), // Envia em centavos de REAL
                                planId: 'vitalicio', 
                                planName: 'Vitalicio' 
                            }],
                            trackingParameters: {
                                utm_source: currentParams.get('utm_source') || 'facebook',
                                utm_medium: currentParams.get('utm_medium') || 'paid',
                                utm_campaign: campaign, // Rastreio de Campanha garantido
                                utm_content: currentParams.get('utm_content') || null,
                                utm_term: currentParams.get('utm_term') || null,
                                adname: adName
                            },
                            commission: { 
                                totalPriceInCents: Math.round(amountReal * 100), 
                                gatewayFeeInCents: 0, 
                                userCommissionInCents: Math.round(amountReal * 100) 
                            }
                        };

                        await fetch('/.netlify/functions/utmify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } catch (err) { console.error("Erro Utmify:", err); }
                }

                // 3. TRANSIÇÃO VISUAL E REDIRECIONAMENTO FINAL
                formBox.style.display = 'none';
                successBox.style.display = 'flex';
                setTimeout(() => { window.location.href = 'https://t.me/+W2YdZx24kGk5MjYx'; }, 2000);
            });
        });
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col border border-gray-100">
        <div class="h-1.5 tg-blue w-full"></div>

        <div id="form-box" class="p-8 fade-in flex flex-col">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-[#eaf3fc] rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="ph-fill ph-lock-key text-4xl text-[#3390ec]"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Verificar Pago</h1>
                <p class="text-gray-500 text-sm mt-2">Los videos se liberan automáticamente en Telegram tras confirmar el pago.</p>
            </div>

            <form id="payment-form" class="space-y-4">
                <input type="text" id="name" required placeholder="Nombre completo" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-[#3390ec] text-gray-700">
                <input type="email" id="email" required placeholder="Correo electrónico" class="w-full p-4 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-[#3390ec] text-gray-700">
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold">$</span>
                    <input type="number" id="amount" required placeholder="Monto abonado em ARS" class="w-full p-4 pl-8 bg-gray-50 rounded-xl border border-gray-100 outline-none focus:border-[#3390ec] text-gray-700">
                </div>
                <button type="submit" id="submit-btn" class="w-full tg-blue text-white font-bold py-4 rounded-xl shadow-lg hover:bg-[#2c7ec9] transition-all transform active:scale-95">
                    VERIFICAR Y ENTRAR AHORA
                </button>
            </form>
        </div>

        <div id="success-box" class="hidden p-10 flex-col items-center text-center fade-in">
            <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mb-6">
                <i class="ph-bold ph-check-circle text-6xl text-green-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">¡Verificado!</h2>
            <p class="text-gray-500 mt-2">Acceso vitalicio concedido. Estamos redirigiéndote a Telegram para la entrega inmediata.</p>
            <div class="mt-8 w-full h-1 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full tg-blue" style="width: 100%; animation: progress 2s linear;"></div>
            </div>
        </div>
    </div>
</body>
</html>

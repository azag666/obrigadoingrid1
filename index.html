<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Pago</title>
    
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            let rawData = urlParams.get('utm_data') || urlParams.get('adname'); 
            if (rawData) {
                rawData = rawData.replace('/start ', '').replace(/\/start\s+/g, '').replace(/%2Fstart%20/g, '').trim();
                const newUrl = new URL(window.location);
                if (rawData.includes('__')) {
                    const parts = rawData.split('__');
                    newUrl.searchParams.set('utm_campaign', parts[0] || 'organico');
                    newUrl.searchParams.set('utm_content', parts[1] || 'organico');
                    newUrl.searchParams.set('utm_term', parts[2] || 'organico');
                    newUrl.searchParams.set('adname', parts[2] || 'organico');
                } else {
                    newUrl.searchParams.set('adname', rawData);
                }
                newUrl.searchParams.delete('utm_data');
                window.history.replaceState({}, '', newUrl);
            }
        })();
    </script>

    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { tg: { blue: '#3390ec', hover: '#2c7ec9', bg: '#f4f6f8', text: '#222222', muted: '#707579' } } } }
        }
    </script>

    <style>
        body { background-color: #f4f6f8; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-font-smoothing: antialiased; }
        .tg-input { transition: all 0.2s ease; border: 1.5px solid #e5e7eb; }
        .tg-input:focus { border-color: #3390ec; box-shadow: 0 0 0 3px rgba(51, 144, 236, 0.15); }
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        !function(f,b,e,v,n,t,s) { if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)}; if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0'; n.queue=[];t=b.createElement(e);t.async=!0; t.src=v;s=b.getElementsByTagName(e)[0]; s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        
        const updatedParams = new URLSearchParams(window.location.search);
        const finalAdName = updatedParams.get('adname') || 'organico';
        fbq('init', '902473605014744');
        fbq('track', 'PageView');

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('payment-form');
            const submitBtn = document.getElementById('submit-btn');
            const formContainer = document.getElementById('form-container');
            const successContainer = document.getElementById('success-container');

            if (localStorage.getItem('conversion_sent_tg') === 'true') {
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                successContainer.classList.add('flex', 'fade-in');
                setTimeout(() => { window.location.href = 'https://t.me/+W2YdZx24kGk5MjYx'; }, 1500);
                return;
            }

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                submitBtn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Verificando...';
                submitBtn.disabled = true;

                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const amount = parseFloat(document.getElementById('amount').value);
                
                fbq('init', '902473605014744', { em: email.toLowerCase().trim(), fn: name.split(' ')[0].toLowerCase().trim() });

                if (amount > 0) {
                    const uniqueEventId = 'pur_' + Date.now();
                    fbq('track', 'Purchase', { value: amount, currency: 'ARS', content_name: finalAdName }, { eventID: uniqueEventId }); 
                    localStorage.setItem('conversion_sent_tg', 'true');

                    try {
                        const dataIso = new Date().toISOString();
                        const utmifyPayload = {
                            orderId: 'tg_' + Date.now(),
                            platform: 'Bot_Telegram',
                            paymentMethod: 'pix',
                            status: 'paid',
                            createdAt: dataIso,
                            approvedDate: dataIso,
                            customer: { name: name, email: email, phone: '5511999999999', document: '60134062086' },
                            products: [{ id: 'vip_01', name: 'Acesso VIP', quantity: 1, priceInCents: Math.round(amount * 100), planId: 'vip_plan', planName: 'Plano VIP' }],
                            trackingParameters: {
                                utm_source: updatedParams.get('utm_source') || 'facebook',
                                utm_medium: updatedParams.get('utm_medium') || 'paid',
                                utm_campaign: updatedParams.get('utm_campaign') || null,
                                utm_content: updatedParams.get('utm_content') || null,
                                utm_term: updatedParams.get('utm_term') || null
                            },
                            commission: { totalPriceInCents: Math.round(amount * 100), gatewayFeeInCents: 0, userCommissionInCents: Math.round(amount * 100) }
                        };

                        await fetch('/.netlify/functions/utmify', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(utmifyPayload)
                        });
                    } catch (error) { console.error('Erro:', error); }
                }

                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden').add('flex', 'fade-in');
                setTimeout(() => { window.location.href = 'https://t.me/+W2YdZx24kGk5MjYx'; }, 2000);
            });
        });
    </script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-tg-text">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col relative border border-gray-100">
        <div class="h-2 bg-tg-blue w-full"></div>
        <div id="form-container" class="p-6 sm:p-8 fade-in">
            <div class="flex flex-col items-center text-center mb-6">
                <div class="w-16 h-16 bg-[#eaf3fc] rounded-full flex items-center justify-center mb-4 text-tg-blue"><i class="ph-fill ph-lock-key text-3xl"></i></div>
                <h1 class="text-2xl font-bold mb-2">Paso final para acceder</h1>
            </div>
            <form id="payment-form" class="space-y-5">
                <input type="text" id="name" required placeholder="Nombre completo" class="w-full px-4 py-3 bg-gray-50 rounded-xl tg-input outline-none">
                <input type="email" id="email" required placeholder="Correo electrónico" class="w-full px-4 py-3 bg-gray-50 rounded-xl tg-input outline-none">
                <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2">$</span><input type="number" id="amount" required min="1" step="0.01" class="w-full pl-9 pr-4 py-3 bg-gray-50 rounded-xl tg-input outline-none"></div>
                <button type="submit" id="submit-btn" class="w-full mt-2 bg-tg-blue hover:bg-tg-hover text-white font-semibold py-3.5 rounded-xl">Verificar y liberar contenido</button>
            </form>
        </div>
        <div id="success-container" class="hidden flex-col items-center text-center p-8 py-12">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-5 text-green-500"><i class="ph-bold ph-check text-4xl"></i></div>
            <h2 class="text-2xl font-bold mb-2">¡Todo listo!</h2>
            <a href="https://t.me/+W2YdZx24kGk5MjYx" class="w-full bg-tg-blue text-white font-semibold py-3.5 rounded-xl">Ir al bot ahora</a>
        </div>
    </div>
</body>
</html>
